<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗潮 Dark Tide — 战略地图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#DAA520;--gold-light:#F0D060;--gold-dark:#8B6914;
  --bg-deep:#0a0a14;--bg-panel:#12121e;--bg-panel-alpha:rgba(18,18,30,0.92);
  --border-gold:linear-gradient(135deg,#8B6914,#DAA520,#F0D060,#DAA520,#8B6914);
  --text-primary:#e8e0d0;--text-secondary:#a09880;--text-dim:#605848;
  --orc-primary:#8B0000;--orc-accent:#FF6600;
  --pirate-primary:#1B2A4A;--pirate-accent:#DAA520;
  --darkelf-primary:#3D0066;--darkelf-accent:#C0C0C0;
  --human-primary:#DAA520;--human-accent:#CC0000;
  --elf-primary:#006633;--elf-accent:#4169E1;
  --mage-primary:#0047AB;--mage-accent:#7B2FBE;
  --neutral-primary:#8B7D6B;--neutral-accent:#C4A35A;
}
html{font-size:14px}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;min-height:100vh}

/* === ORNAMENTAL HELPERS === */
.gold-border{position:relative;border:1px solid var(--gold-dark);background:var(--bg-panel-alpha);box-shadow:inset 0 0 30px rgba(0,0,0,0.5),0 0 1px var(--gold-dark)}
.gold-border::before{content:'';position:absolute;inset:-1px;padding:1px;background:var(--border-gold);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.7}

/* === PARCHMENT TEXTURE (CSS-only) === */
.parchment-bg{
  background:
    radial-gradient(ellipse at 20% 30%,rgba(90,70,40,0.15) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 70%,rgba(60,50,30,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(80,65,35,0.08) 0%,transparent 70%),
    linear-gradient(180deg,#2a2218 0%,#1e1a12 30%,#221e14 70%,#1a1610 100%);
  background-color:#1c1810;
}

/* === GAME FRAME === */
.game-frame{width:1280px;height:720px;margin:20px auto;position:relative;display:flex;flex-direction:column;overflow:hidden;border:2px solid var(--gold-dark);box-shadow:0 0 60px rgba(218,165,32,0.08),0 0 120px rgba(0,0,0,0.6)}
.game-frame::before,.game-frame::after{content:'';position:absolute;width:24px;height:24px;border:2px solid var(--gold);z-index:20;pointer-events:none}
.game-frame::before{top:2px;left:2px;border-right:none;border-bottom:none}
.game-frame::after{top:2px;right:2px;border-left:none;border-bottom:none}
@media(max-width:1320px){.game-frame{transform-origin:top center;transform:scale(calc(100vw / 1320))}}

/* === TOP RESOURCE BAR === */
.resource-bar{height:44px;display:flex;align-items:center;padding:0 12px;gap:4px;background:linear-gradient(180deg,#1a1610 0%,#141008 100%);border-bottom:1px solid var(--gold-dark);position:relative;z-index:10;flex-shrink:0}
.resource-bar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.res-item{display:flex;align-items:center;gap:4px;padding:0 8px;font-size:13px;font-family:'Noto Sans SC',sans-serif}
.res-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.res-icon svg{width:20px;height:20px}
.res-value{color:var(--gold-light);font-weight:700;font-size:14px;min-width:32px;text-align:right}
.res-label{color:var(--text-secondary);font-size:11px}
.res-divider{width:1px;height:24px;background:linear-gradient(180deg,transparent,var(--gold-dark),transparent);margin:0 4px}
.turn-counter{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'Noto Serif SC',serif;font-weight:700;color:var(--gold);font-size:16px;letter-spacing:1px}
.turn-counter .turn-num{font-size:22px;color:var(--gold-light);text-shadow:0 0 8px rgba(218,165,32,0.4)}

/* === MAIN AREA === */
.main-area{flex:1;display:flex;overflow:hidden;position:relative}

/* === MAP AREA === */
.map-area{flex:1;position:relative;overflow:hidden;cursor:grab}
.map-area:active{cursor:grabbing}
.map-viewport{width:100%;height:100%;position:relative}
.map-canvas{position:absolute;inset:0}

/* === SVG MAP === */
.map-svg{width:100%;height:100%}
.map-svg text{font-family:'Noto Sans SC',sans-serif;pointer-events:none;user-select:none}

/* Territory node styles */
.territory-node{cursor:pointer;transition:filter 0.2s}
.territory-node:hover{filter:brightness(1.3)}
.territory-node:hover .node-glow{opacity:0.6}
.territory-node.selected .node-glow{opacity:0.8;animation:pulse-glow 1.5s infinite}
.territory-node.attackable .node-border{stroke:#ff2020;animation:pulse-red 1s infinite}
.node-glow{opacity:0;transition:opacity 0.3s}

/* Connection paths */
.connection-path{stroke:#4a4030;stroke-width:2;fill:none;stroke-dasharray:8 4;opacity:0.5}
.supply-line{stroke:var(--gold);stroke-width:1.5;fill:none;stroke-dasharray:6 4;opacity:0.6;animation:supply-flow 2s linear infinite}

/* Fog of war */
.fog-territory{opacity:0.7;animation:fog-drift 8s ease-in-out infinite alternate}

@keyframes pulse-glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes pulse-red{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes supply-flow{to{stroke-dashoffset:-20}}
@keyframes fog-drift{0%{opacity:0.6}100%{opacity:0.8}}

/* === MINIMAP === */
.minimap{position:absolute;bottom:8px;left:8px;width:160px;height:100px;z-index:5}
.minimap-inner{width:100%;height:100%;background:rgba(10,10,20,0.85);border:1px solid var(--gold-dark);position:relative;overflow:hidden}
.minimap-dot{position:absolute;width:4px;height:4px;border-radius:50%}
.minimap-viewport{position:absolute;border:1px solid rgba(255,255,255,0.5);pointer-events:none}
.minimap-label{position:absolute;top:-18px;left:0;font-size:10px;color:var(--text-secondary);letter-spacing:2px;text-transform:uppercase}

/* === RIGHT INFO PANEL === */
.info-panel{width:280px;background:linear-gradient(180deg,#141010 0%,#100e0a 50%,#141010 100%);border-left:1px solid var(--gold-dark);display:flex;flex-direction:column;position:relative;flex-shrink:0;z-index:5}
.info-panel::before{content:'';position:absolute;left:-1px;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--gold),transparent)}

.panel-header{padding:12px 14px;border-bottom:1px solid rgba(218,165,32,0.2);display:flex;align-items:center;gap:10px}
.panel-header .territory-icon{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.panel-header .territory-name{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--gold-light)}
.panel-header .territory-type{font-size:11px;color:var(--text-secondary)}

.panel-section{padding:10px 14px;border-bottom:1px solid rgba(218,165,32,0.08)}
.panel-section-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:6px;font-weight:500}
.panel-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:12px}
.panel-row .label{color:var(--text-secondary)}
.panel-row .value{color:var(--text-primary);font-weight:500}

.garrison-list{display:flex;flex-direction:column;gap:4px}
.garrison-item{display:flex;align-items:center;gap:8px;padding:4px 8px;background:rgba(255,255,255,0.03);border-radius:3px}
.garrison-item .troop-icon{width:24px;height:24px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px}
.garrison-item .troop-name{flex:1;font-size:11px;color:var(--text-secondary)}
.garrison-item .troop-count{font-size:13px;font-weight:700;color:var(--gold-light)}

.building-list{display:flex;flex-direction:column;gap:3px}
.building-item{display:flex;align-items:center;gap:6px;font-size:11px}
.building-item .bld-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:12px}
.building-item .bld-level{color:var(--gold);font-size:10px}

.production-row{display:flex;gap:12px;flex-wrap:wrap}
.prod-item{display:flex;align-items:center;gap:4px;font-size:12px}
.prod-item svg{width:16px;height:16px}
.prod-item .prod-val{color:#8f8;font-weight:600}

.panel-actions{padding:10px 14px;margin-top:auto;display:flex;flex-wrap:wrap;gap:6px}
.panel-btn{flex:1;min-width:calc(50% - 3px);padding:8px 4px;font-size:11px;font-family:'Noto Sans SC',sans-serif;border:1px solid var(--gold-dark);background:linear-gradient(180deg,#2a2218,#1a1610);color:var(--gold-light);cursor:pointer;text-align:center;transition:all 0.2s;position:relative;letter-spacing:1px}
.panel-btn:hover{background:linear-gradient(180deg,#3a3228,#2a2218);border-color:var(--gold);box-shadow:0 0 8px rgba(218,165,32,0.2)}
.panel-btn:active{transform:scale(0.97)}
.panel-btn.primary{background:linear-gradient(180deg,#4a2218,#3a1610);border-color:#cc4444}

/* === BOTTOM ACTION BAR === */
.action-bar{height:64px;display:flex;align-items:center;justify-content:center;padding:0 16px;gap:6px;background:linear-gradient(180deg,#141008 0%,#1a1610 100%);border-top:1px solid var(--gold-dark);position:relative;z-index:10;flex-shrink:0}
.action-bar::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

.action-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;border:1px solid var(--gold-dark);background:linear-gradient(180deg,#2a2218 0%,#1a1610 50%,#141008 100%);color:var(--text-secondary);cursor:pointer;transition:all 0.2s;position:relative;min-width:72px}
.action-btn::before{content:'';position:absolute;inset:-1px;padding:1px;background:var(--border-gold);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0}
.action-btn:hover{background:linear-gradient(180deg,#3a3228 0%,#2a2218 50%,#1a1610 100%);color:var(--gold-light)}
.action-btn:hover::before{opacity:0.5}
.action-btn:active{transform:translateY(1px)}
.action-btn .btn-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.action-btn .btn-icon svg{width:24px;height:24px}
.action-btn .btn-label{font-size:10px;letter-spacing:1px;font-weight:500}

.action-btn.end-turn{border-color:#cc4444;background:linear-gradient(180deg,#3a1818 0%,#2a1010 100%)}
.action-btn.end-turn:hover{background:linear-gradient(180deg,#4a2020 0%,#3a1818 100%);color:#ff8888}

/* === ASSET SHOWCASE === */
.asset-showcase{max-width:1280px;margin:40px auto;padding:0 20px}
.showcase-title{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:8px;letter-spacing:4px}
.showcase-subtitle{text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:32px;letter-spacing:2px}

.asset-category{margin-bottom:32px}
.category-title{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--gold-light);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(218,165,32,0.2);letter-spacing:2px;display:flex;align-items:center;gap:8px}
.category-title::before{content:'';width:4px;height:18px;background:var(--gold);display:inline-block}

.asset-grid{display:grid;gap:12px}
.asset-grid.terrain-grid{grid-template-columns:repeat(5,1fr)}
.asset-grid.node-grid{grid-template-columns:repeat(7,1fr)}
.asset-grid.icon-grid{grid-template-columns:repeat(9,1fr)}
.asset-grid.ui-grid{grid-template-columns:repeat(4,1fr)}
.asset-grid.faction-grid{grid-template-columns:repeat(7,1fr)}
.asset-grid.resource-grid{grid-template-columns:repeat(8,1fr)}

.asset-card{background:rgba(20,16,8,0.8);border:1px solid rgba(218,165,32,0.15);padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all 0.2s}
.asset-card:hover{border-color:var(--gold);background:rgba(40,36,28,0.8)}
.asset-card .asset-preview{width:64px;height:64px;display:flex;align-items:center;justify-content:center}
.asset-card .asset-preview svg{width:100%;height:100%}
.asset-card .asset-preview.large{width:80px;height:80px}
.asset-card .asset-label{font-size:10px;color:var(--text-secondary);text-align:center;letter-spacing:1px}
.asset-card .asset-label-zh{font-size:11px;color:var(--text-primary);font-weight:500}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0a14}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* === TOOLTIP === */
.map-tooltip{position:absolute;pointer-events:none;background:rgba(10,10,20,0.95);border:1px solid var(--gold-dark);padding:8px 12px;font-size:11px;color:var(--text-primary);z-index:100;display:none;min-width:120px;box-shadow:0 4px 16px rgba(0,0,0,0.6)}
.map-tooltip .tt-name{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--gold-light);font-weight:700;margin-bottom:4px}
.map-tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;padding:1px 0}
.map-tooltip .tt-label{color:var(--text-secondary)}
</style>
</head>
<body>

<!-- PAGE HEADER -->
<div style="text-align:center;padding:24px 0 8px;position:relative">
  <div style="font-family:'Noto Serif SC',serif;font-size:36px;font-weight:900;color:#DAA520;letter-spacing:8px;text-shadow:0 2px 12px rgba(218,165,32,0.3)">暗 潮</div>
  <div style="font-size:12px;color:#605848;letter-spacing:6px;margin-top:2px">DARK TIDE — STRATEGIC MAP UI</div>

<!-- GAME FRAME -->
<div class="game-frame" id="gameFrame">

  <div style="position:absolute;bottom:2px;right:2px;width:24px;height:24px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);z-index:20;pointer-events:none"></div>

      <!-- TOOLTIP -->
      <div class="map-tooltip" id="mapTooltip">
        <div class="tt-name"></div>
        <div class="tt-content"></div>
      </div>
    </div>

    <!-- RIGHT INFO PANEL -->
    <div class="info-panel" id="infoPanel">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- BOTTOM ACTION BAR -->
  <div class="action-bar" id="actionBar">
    <!-- Filled by JS -->
  </div>
</div>

<!-- ASSET SHOWCASE -->
<div class="asset-showcase" id="assetShowcase">

</div>

// === FACTION CREST SVG ===
function getFactionCrest(faction, size) {
  const s = size;
  const f = FACTIONS[faction];
  if (!f) return '';
  const crests = {
    orc: `<path d="M0 -${s} L${s*0.3} -${s*0.3} L${s} 0 L${s*0.3} ${s*0.3} L0 ${s} L-${s*0.3} ${s*0.3} L-${s} 0 L-${s*0.3} -${s*0.3}Z" fill="${f.primary}" stroke="${f.accent}" stroke-width="1"/>`,
    pirate: `<circle r="${s*0.8}" fill="${f.primary}" stroke="${f.accent}" stroke-width="1"/><path d="M-${s*0.3} -${s*0.1} L${s*0.3} -${s*0.1} M0 -${s*0.4} L0 ${s*0.4} M-${s*0.2} ${s*0.2} Q0 ${s*0.5} ${s*0.2} ${s*0.2}" stroke="${f.accent}" stroke-width="0.8" fill="none"/>`,
    darkelf: `<polygon points="0,-${s} ${s*0.6},${s*0.7} -${s*0.6},${s*0.7}" fill="${f.primary}" stroke="${f.accent}" stroke-width="1"/><circle cy="-${s*0.1}" r="${s*0.2}" fill="${f.accent}" opacity="0.5"/>`,
    human: `<rect x="-${s*0.7}" y="-${s*0.8}" width="${s*1.4}" height="${s*1.6}" rx="2" fill="${f.primary}" stroke="${f.accent}" stroke-width="1" opacity="0.9"/>`,
    elf: `<ellipse rx="${s*0.6}" ry="${s*0.8}" fill="${f.primary}" stroke="${f.accent}" stroke-width="1"/><path d="M0 -${s*0.5} Q${s*0.3} 0 0 ${s*0.5} Q-${s*0.3} 0 0 -${s*0.5}" fill="${f.accent}" opacity="0.3"/>`,
    mage: `<circle r="${s*0.7}" fill="${f.primary}" stroke="${f.accent}" stroke-width="1"/><polygon points="0,-${s*0.5} ${s*0.15},-${s*0.15} ${s*0.5},-${s*0.15} ${s*0.2},${s*0.1} ${s*0.3},${s*0.45} 0,${s*0.25} -${s*0.3},${s*0.45} -${s*0.2},${s*0.1} -${s*0.5},-${s*0.15} -${s*0.15},-${s*0.15}" fill="${f.accent}" opacity="0.4"/>`,
    neutral: `<circle r="${s*0.7}" fill="${f.primary}" stroke="${f.secondary}" stroke-width="1"/>`,
    none: `<circle r="${s*0.5}" fill="${f.primary}" stroke="${f.border}" stroke-width="0.5" stroke-dasharray="2 2"/>`
  };
  return crests[faction] || crests.neutral;
}

// RENDERING

// State
let selectedTerritory = null;
let hoveredTerritory = null;

// Build resource bar
function buildResourceBar() {
  const bar = document.getElementById('resourceBar');
  const resources = [
    {key:'gold',value:'2,450'},{key:'food',value:'180'},{key:'iron',value:'75'},
    {key:'slaves',value:'32'},{key:'prestige',value:'48'},{key:'order',value:'62'},
    {key:'threat',value:'35'},{key:'mana',value:'18'}
  ];
  let html = '';
  resources.forEach((r, i) => {
    const res = RESOURCE_ICONS[r.key];
    html += `<div class="res-item">
      <div class="res-icon"><svg viewBox="0 0 20 20">${res.svg}</svg></div>
      <span class="res-value">${r.value}</span>
    </div>`;
    if (i < resources.length - 1) html += `<div class="res-divider"></div>`;
  });
  html += `<div class="turn-counter">
    <span style="font-size:11px;color:var(--text-secondary)">回合</span>
    <span class="turn-num">07</span>
    <span style="font-size:11px;color:var(--text-secondary)">/30</span>
  </div>`;
  bar.innerHTML = html;
}

// Build map SVG
function buildMap() {
  const svg = document.getElementById('mapSvg');
  const defs = svg.querySelector('defs');
  defs.innerHTML = SVG_DEFS;

  // Background — parchment base
  let mapHTML = `
    <rect width="960" height="612" fill="#1c1810"/>
    <rect width="960" height="612" fill="url(#pat-plains)" opacity="0.08"/>
    <rect width="960" height="612" opacity="0.12">
      <animate attributeName="opacity" values="0.10;0.14;0.10" dur="6s" repeatCount="indefinite"/>
    </rect>
  `;

  // Compass rose (top-right)
  mapHTML += `<g transform="translate(910,50)" opacity="0.2">
    <circle r="20" fill="none" stroke="#DAA520" stroke-width="0.5"/>
    <path d="M0 -18 L3 -5 L0 -8 L-3 -5 Z" fill="#DAA520"/>
    <path d="M0 18 L3 5 L0 8 L-3 5 Z" fill="#8B6914"/>
    <path d="M18 0 L5 3 L8 0 L5 -3 Z" fill="#8B6914"/>
    <path d="M-18 0 L-5 3 L-8 0 L-5 -3 Z" fill="#8B6914"/>
    <text y="-22" text-anchor="middle" fill="#DAA520" font-size="7" font-weight="bold">N</text>
  </g>`;

  // Map border decoration
  mapHTML += `
    <rect x="4" y="4" width="952" height="604" fill="none" stroke="#DAA520" stroke-width="0.3" opacity="0.2" rx="2"/>
    <line x1="0" y1="0" x2="20" y2="0" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="960" y1="0" x2="940" y2="0" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="960" y1="0" x2="960" y2="20" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="612" x2="20" y2="612" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="612" x2="0" y2="592" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="960" y1="612" x2="940" y2="612" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
    <line x1="960" y1="612" x2="960" y2="592" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
  `;

  // Regional background zones (soft color washes)
  mapHTML += `
    <ellipse cx="160" cy="280" rx="140" ry="120" fill="${FACTIONS.orc.primary}" opacity="0.06"/>
    <ellipse cx="760" cy="180" rx="160" ry="120" fill="${FACTIONS.human.primary}" opacity="0.06"/>
    <ellipse cx="200" cy="100" rx="120" ry="80" fill="${FACTIONS.elf.primary}" opacity="0.06"/>
    <ellipse cx="520" cy="510" rx="140" ry="100" fill="${FACTIONS.mage.primary}" opacity="0.06"/>
    <ellipse cx="810" cy="460" rx="120" ry="100" fill="${FACTIONS.pirate.primary}" opacity="0.06"/>
    <ellipse cx="430" cy="80" rx="80" ry="60" fill="${FACTIONS.darkelf.primary}" opacity="0.06"/>
  `;

  // Connection paths
  mapHTML += `<g class="connections">`;
  const tMap = {};
  TERRITORIES.forEach(t => tMap[t.id] = t);
  ADJACENCY.forEach(([a, b]) => {
    const ta = tMap[a], tb = tMap[b];
    if (!ta || !tb) return;
    const isSupply = (ta.faction === 'orc' && tb.faction === 'orc') || (ta.faction === 'pirate' && tb.faction === 'pirate') || (ta.faction === 'darkelf' && tb.faction === 'darkelf');
    if (isSupply) {
      mapHTML += `<line x1="${ta.x}" y1="${ta.y}" x2="${tb.x}" y2="${tb.y}" class="supply-line"/>`;
    }
    mapHTML += `<line x1="${ta.x}" y1="${ta.y}" x2="${tb.x}" y2="${tb.y}" class="connection-path"/>`;
  });
  mapHTML += `</g>`;

  // Territory nodes
  mapHTML += `<g class="territories">`;
  TERRITORIES.forEach(t => {
    const f = FACTIONS[t.faction] || FACTIONS.none;
    const r = t.size / 2;
    const terrainPat = TERRAIN_PATTERN[t.terrain] || 'pat-plains';
    const isFog = t.faction === 'none' && t.type !== 'event';

    mapHTML += `<g class="territory-node${isFog ? ' fog-territory' : ''}" data-id="${t.id}" transform="translate(${t.x},${t.y})">`;

    // Glow (hidden by default)
    mapHTML += `<circle class="node-glow" r="${r + 6}" fill="none" stroke="${f.flag}" stroke-width="3" filter="url(#glow-gold)"/>`;

    // Territory shape — hexagonal
    const hex = hexPoints(r);
    mapHTML += `<polygon class="node-bg" points="${hex}" fill="url(#${terrainPat})" stroke="${f.border}" stroke-width="2"/>`;

    // Faction color overlay
    mapHTML += `<polygon points="${hex}" fill="${f.primary}" opacity="0.35"/>`;

    // Border highlight
    mapHTML += `<polygon class="node-border" points="${hex}" fill="none" stroke="${f.flag}" stroke-width="1.5" opacity="0.6"/>`;

    // Type icon
    mapHTML += `<g class="type-icon">${getTypeIconSVG(t.type, t.size)}</g>`;

    // Garrison badge
    if (t.garrison > 0) {
      mapHTML += `<g transform="translate(${r - 4},${-r + 4})">
        <rect x="-8" y="-7" width="16" height="14" rx="2" fill="rgba(0,0,0,0.7)" stroke="${f.flag}" stroke-width="0.5"/>
        <text text-anchor="middle" dy="4" fill="${f.flag}" font-size="9" font-weight="bold">${t.garrison}</text>
      </g>`;
    }

    // Faction crest (small, top-left)
    if (t.faction !== 'none') {
      mapHTML += `<g transform="translate(${-r + 4},${-r + 4}) scale(0.6)">${getFactionCrest(t.faction, 8)}</g>`;
    }

    // Territory name
    mapHTML += `<text y="${r + 12}" text-anchor="middle" fill="${f.flag}" font-size="${t.size > 60 ? 10 : 8}" font-weight="${t.size > 60 ? '700' : '400'}" opacity="0.9" style="text-shadow:0 1px 2px rgba(0,0,0,0.8)">${t.name}</text>`;

    // Fog overlay for unclaimed
    if (isFog) {
      mapHTML += `<polygon points="${hex}" fill="rgba(8,8,12,0.45)"/>`;
    }

    mapHTML += `</g>`;
  });
  mapHTML += `</g>`;

  // Vignette overlay
  mapHTML += `<rect width="960" height="612" fill="url(#vignette)" pointer-events="none"/>`;

  // Add vignette gradient to defs
  defs.innerHTML += `
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(10,10,20,0.4)"/>
    </radialGradient>
  `;

  svg.innerHTML = `<defs>${defs.innerHTML}</defs>${mapHTML}`;

  // Bind events
  svg.querySelectorAll('.territory-node').forEach(node => {
    node.addEventListener('mouseenter', onTerritoryHover);
    node.addEventListener('mouseleave', onTerritoryLeave);
    node.addEventListener('click', onTerritoryClick);
  });
}

function hexPoints(r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    pts.push(`${(r * Math.cos(angle)).toFixed(1)},${(r * Math.sin(angle)).toFixed(1)}`);
  }
  return pts.join(' ');
}

// === TOOLTIP ===
function onTerritoryHover(e) {
  const id = this.dataset.id;
  const t = TERRITORIES.find(t => t.id === id);
  if (!t) return;
  hoveredTerritory = t;
  const tooltip = document.getElementById('mapTooltip');
  const f = FACTIONS[t.faction] || FACTIONS.none;
  const terrain = TERRAINS[t.terrain];
  tooltip.querySelector('.tt-name').textContent = t.name;
  tooltip.querySelector('.tt-content').innerHTML = `
    <div class="tt-row"><span class="tt-label">势力</span><span style="color:${f.flag}">${f.name}</span></div>
    <div class="tt-row"><span class="tt-label">地形</span><span>${terrain ? terrain.name : t.terrain}</span></div>
    <div class="tt-row"><span class="tt-label">驻军</span><span>${t.garrison}</span></div>
    ${t.special ? `<div class="tt-row"><span class="tt-label">特殊</span><span style="color:#ffd700">${t.special}</span></div>` : ''}
  `;
  tooltip.style.display = 'block';

  const mapArea = document.getElementById('mapArea');
  const rect = mapArea.getBoundingClientRect();
  const svgRect = document.getElementById('mapSvg').getBoundingClientRect();
  const scaleX = svgRect.width / 960;
  const scaleY = svgRect.height / 612;

  tooltip.style.left = (t.x * scaleX + svgRect.left - rect.left + 20) + 'px';
  tooltip.style.top = (t.y * scaleY + svgRect.top - rect.top - 40) + 'px';
}

function onTerritoryLeave() {
  hoveredTerritory = null;
  document.getElementById('mapTooltip').style.display = 'none';
}

function onTerritoryClick() {
  const id = this.dataset.id;
  const t = TERRITORIES.find(t => t.id === id);
  if (!t) return;

  // Clear previous selection
  document.querySelectorAll('.territory-node.selected').forEach(n => n.classList.remove('selected'));
  document.querySelectorAll('.territory-node.attackable').forEach(n => n.classList.remove('attackable'));

  this.classList.add('selected');
  selectedTerritory = t;

  // Highlight adjacent territories
  const adjIds = new Set();
  ADJACENCY.forEach(([a, b]) => {
    if (a === id) adjIds.add(b);
    if (b === id) adjIds.add(a);
  });

  const playerFactions = ['orc','pirate','darkelf'];
  if (playerFactions.includes(t.faction)) {
    adjIds.forEach(adjId => {
      const adjT = TERRITORIES.find(tt => tt.id === adjId);
      if (adjT && !playerFactions.includes(adjT.faction)) {
        const node = document.querySelector(`.territory-node[data-id="${adjId}"]`);
        if (node) node.classList.add('attackable');
      }
    });
  }

  updateInfoPanel(t);
}

    <div class="panel-section">
      <div class="panel-section-title">资源产出</div>
      <div class="production-row">
        <div class="prod-item"><svg viewBox="0 0 20 20" width="16" height="16">${RESOURCE_ICONS.gold.svg}</svg><span class="prod-val">+${Math.floor(t.garrison * 2.5)}</span></div>
        <div class="prod-item"><svg viewBox="0 0 20 20" width="16" height="16">${RESOURCE_ICONS.food.svg}</svg><span class="prod-val">+${Math.floor(t.garrison * 1.2)}</span></div>
        <div class="prod-item"><svg viewBox="0 0 20 20" width="16" height="16">${RESOURCE_ICONS.iron.svg}</svg><span class="prod-val">+${Math.floor(t.garrison * 0.5)}</span></div>
      </div>
    </div>

    <div class="panel-actions">
      <button class="panel-btn primary">⚔ 出击</button>
      <button class="panel-btn">🏗 建造</button>
      <button class="panel-btn">👥 招募</button>
      <button class="panel-btn">📋 详情</button>
    </div>
  `;
}

// === ACTION BAR ===
function buildActionBar() {
  const bar = document.getElementById('actionBar');
  let html = '';
  ACTION_BUTTONS.forEach(btn => {
    html += `<div class="action-btn ${btn.cls || ''}" data-action="${btn.id}">
      <div class="btn-icon"><svg viewBox="0 0 24 24">${btn.icon}</svg></div>
      <span class="btn-label">${btn.label}</span>
    </div>`;
  });
  bar.innerHTML = html;
}

// === MINIMAP ===
function buildMinimap() {
  const mm = document.getElementById('minimap');
  let html = '';
  TERRITORIES.forEach(t => {
    const f = FACTIONS[t.faction] || FACTIONS.none;
    const mx = (t.x / 960) * 160;
    const my = (t.y / 612) * 100;
    const sz = t.size > 60 ? 5 : t.size > 44 ? 4 : 3;
    html += `<div class="minimap-dot" style="left:${mx - sz/2}px;top:${my - sz/2}px;width:${sz}px;height:${sz}px;background:${f.flag}"></div>`;
  });
  // Viewport indicator
  html += `<div class="minimap-viewport" style="left:20px;top:15px;width:60px;height:40px"></div>`;
  mm.innerHTML = html;
}

// === ASSET SHOWCASE ===
function buildAssetShowcase() {
  const showcase = document.getElementById('assetShowcase');
  let html = '';

  // 1. Terrain tiles
  html += `<div class="asset-category">
    <div class="category-title">地形贴图 Terrain Tiles</div>
    <div class="asset-grid terrain-grid">`;
  Object.entries(TERRAINS).forEach(([key, t]) => {
    const pat = TERRAIN_PATTERN[key];
    html += `<div class="asset-card">
      <div class="asset-preview"><svg viewBox="0 0 64 64"><defs>${SVG_DEFS}</defs><rect width="64" height="64" fill="url(#${pat})" rx="4"/></svg></div>
      <div class="asset-label-zh">${t.name}</div>
      <div class="asset-label">${key}</div>
    </div>`;
  });
  html += `</div></div>`;

  // 2. Territory nodes by faction
  html += `<div class="asset-category">
    <div class="category-title">阵营据点节点 Faction Territory Nodes</div>
    <div class="asset-grid node-grid">`;
  Object.entries(FACTIONS).forEach(([key, f]) => {
    if (key === 'none') return;
    html += `<div class="asset-card">
      <div class="asset-preview"><svg viewBox="-50 -50 100 100">
        <defs>${SVG_DEFS}</defs>
        <polygon points="${hexPoints(36)}" fill="url(#pat-plains)" stroke="${f.border}" stroke-width="2.5"/>
        <polygon points="${hexPoints(36)}" fill="${f.primary}" opacity="0.4"/>
        <polygon points="${hexPoints(36)}" fill="none" stroke="${f.flag}" stroke-width="1.5" opacity="0.7"/>
        ${getTypeIconSVG('core_fortress', 72)}
      </svg></div>
      <div class="asset-label-zh" style="color:${f.flag}">${f.name.split('·')[0]}</div>
      <div class="asset-label">${f.nameEn}</div>
    </div>`;
  });
  html += `</div></div>`;

  // 3. Territory type icons
  const typeEntries = [
    ['core_fortress','核心要塞','Core Fortress'],['stronghold','前哨要塞','Stronghold'],['village','村庄','Village'],
    ['outpost','哨站','Outpost'],['bandit','匪巢','Bandit Lair'],['event','事件点','Event'],
    ['trading_post','交易站','Trading Post'],['watchtower','瞭望塔','Watchtower'],['ruins_special','遗迹','Ruins'],
    ['port','港口','Port'],['mountain_pass','关隘','Mountain Pass'],['crystal_mine','魔晶矿脉','Crystal Mine'],
    ['horse_ranch','战马牧场','Horse Ranch'],['gunpowder','火药工坊','Gunpowder Works'],['shadow_rift','暗影裂隙','Shadow Rift']
  ];
  html += `<div class="asset-category">
    <div class="category-title">据点类型图标 Territory Type Icons</div>
    <div class="asset-grid" style="grid-template-columns:repeat(5,1fr)">`;
  typeEntries.forEach(([type, zh, en]) => {
    html += `<div class="asset-card">
      <div class="asset-preview"><svg viewBox="-40 -40 80 80">
        <circle r="30" fill="rgba(30,26,18,0.8)" stroke="#DAA520" stroke-width="1"/>
        ${getTypeIconSVG(type, 60)}
      </svg></div>
      <div class="asset-label-zh">${zh}</div>
      <div class="asset-label">${en}</div>
    </div>`;
  });
  html += `</div></div>`;

  // 4. Faction crests
  html += `<div class="asset-category">
    <div class="category-title">阵营纹章 Faction Crests</div>
    <div class="asset-grid faction-grid">`;
  Object.entries(FACTIONS).forEach(([key, f]) => {
    if (key === 'none') return;
    html += `<div class="asset-card">
      <div class="asset-preview"><svg viewBox="-20 -20 40 40">${getFactionCrest(key, 14)}</svg></div>
      <div class="asset-label-zh" style="color:${f.flag}">${f.name.split('·')[0]}</div>
      <div class="asset-label">${f.nameEn}</div>
    </div>`;
  });
  html += `</div></div>`;

  // 5. Resource icons
  html += `<div class="asset-category">
    <div class="category-title">资源图标 Resource Icons</div>
    <div class="asset-grid resource-grid">`;
  Object.entries(RESOURCE_ICONS).forEach(([key, r]) => {
    html += `<div class="asset-card">
      <div class="asset-preview"><svg viewBox="0 0 20 20" width="48" height="48">${r.svg}</svg></div>
      <div class="asset-label-zh">${r.label}</div>
      <div class="asset-label">${key}</div>
    </div>`;
  });
  html += `</div></div>`;

  // 6. UI Elements
  html += `<div class="asset-category">
    <div class="category-title">UI元素 UI Elements</div>
    <div class="asset-grid ui-grid">`;

  // Button states
  ['normal','hover','active','disabled'].forEach(state => {
    const styles = {
      normal: 'background:linear-gradient(180deg,#2a2218,#1a1610);border-color:#8B6914',
      hover: 'background:linear-gradient(180deg,#3a3228,#2a2218);border-color:#DAA520;box-shadow:0 0 8px rgba(218,165,32,0.3)',
      active: 'background:linear-gradient(180deg,#1a1610,#2a2218);border-color:#DAA520',
      disabled: 'background:linear-gradient(180deg,#1a1a1a,#141414);border-color:#444;opacity:0.5'
    };
    html += `<div class="asset-card">
      <div class="asset-preview large" style="width:120px">
        <div style="padding:8px 16px;border:1px solid #8B6914;color:#DAA520;font-size:12px;font-family:'Noto Sans SC';letter-spacing:2px;${styles[state]}">行动按钮</div>
      </div>
      <div class="asset-label-zh">按钮·${state}</div>
      <div class="asset-label">btn_${state}</div>
    </div>`;
  });

  // Panel frame
  html += `<div class="asset-card">
    <div class="asset-preview large" style="width:120px;height:80px">
      <div class="gold-border" style="width:100%;height:100%;padding:8px">
        <div style="font-size:9px;color:#DAA520;letter-spacing:1px">面板边框</div>
        <div style="font-size:8px;color:#a09880;margin-top:4px">Panel Frame</div>
      </div>
    </div>
    <div class="asset-label-zh">信息面板</div>

  </div>`;

  // Tooltip
  html += `<div class="asset-card">
    <div class="asset-preview large" style="width:120px;height:80px">
      <div style="background:rgba(10,10,20,0.95);border:1px solid #8B6914;padding:6px 10px;width:100%">
        <div style="font-size:10px;color:#F0D060;font-weight:700">碎骨王座</div>
        <div style="font-size:8px;color:#a09880;margin-top:2px">兽人·铁牙氏族</div>
        <div style="font-size:8px;color:#888;margin-top:2px">驻军: 12</div>
      </div>
    </div>
    <div class="asset-label-zh">悬停提示</div>
    <div class="asset-label">tooltip</div>
  </div>`;

  // Resource bar segment
  html += `<div class="asset-card">
    <div class="asset-preview large" style="width:120px">
      <div style="background:linear-gradient(180deg,#1a1610,#141008);border:1px solid #8B6914;padding:4px 8px;display:flex;align-items:center;gap:4px">
        <svg viewBox="0 0 20 20" width="16" height="16">${RESOURCE_ICONS.gold.svg}</svg>
        <span style="color:#F0D060;font-size:12px;font-weight:700">2,450</span>
      </div>
    </div>
    <div class="asset-label-zh">资源栏单元</div>
    <div class="asset-label">res_bar_item</div>

  // Notification bar
  html += `<div class="asset-card">
    <div class="asset-preview large" style="width:120px">
      <div style="background:rgba(0,100,0,0.3);border:1px solid #4CAF50;padding:4px 8px;font-size:9px;color:#8BC34A;text-align:center">✓ 占领成功</div>
    </div>

  html += `</div></div>`;

  // 7. Interactive States
  html += `<div class="asset-category">
    <div class="category-title">交互状态 Interactive States</div>

  const states = [
    {name:'常规',en:'Normal',glow:'none',border:'#777766',opacity:0.6},
    {name:'悬停',en:'Hover',glow:'url(#glow-gold)',border:'#DAA520',opacity:1},
    {name:'选中(己方)',en:'Selected',glow:'url(#glow-white)',border:'#ffffff',opacity:1,anim:true},
    {name:'可攻击',en:'Attackable',glow:'url(#glow-red)',border:'#ff2020',opacity:1,anim:true},
    {name:'迷雾',en:'Fog of War',glow:'none',border:'#333',opacity:0.4,fog:true}
  ];

  states.forEach(st => {
    html += `<div class="asset-card">
      <div class="asset-preview"><svg viewBox="-50 -50 100 100">
        <defs>${SVG_DEFS}</defs>
        ${st.glow !== 'none' ? `<polygon points="${hexPoints(36)}" fill="none" stroke="${st.border}" stroke-width="3" filter="${st.glow}"${st.anim ? '><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></polygon' : '/'}>`  : ''}

        <polygon points="${hexPoints(36)}" fill="#555550" opacity="0.35"/>

  html += `</div></div>`;

  // 8. Military Markers
  html += `<div class="asset-category">
    <div class="category-title">军事标记 Military Markers</div>
    <div class="asset-grid" style="grid-template-columns:repeat(4,1fr)">`;

  // Army marker
  html += `<div class="asset-card">
    <div class="asset-preview"><svg viewBox="-30 -30 60 60">

    <div class="asset-preview"><svg viewBox="-20 -20 40 40">

  // Supply line
  html += `<div class="asset-card">

  // Connection path
  html += `<div class="asset-card">

  html += `</div></div>`;

  showcase.innerHTML = `
    <div class="showcase-title">美术资源总览</div>

}

// === INITIALIZE ===
function init() {
  buildResourceBar();
  buildMap();
  buildActionBar();
  buildMinimap();

  // Set default selection
  const defaultT = TERRITORIES.find(t => t.id === 'broken_throne');
  if (defaultT) updateInfoPanel(defaultT);

  buildAssetShowcase();
}

document.addEventListener('DOMContentLoaded', init);
</script>

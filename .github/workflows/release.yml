name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2"
  EXPORT_NAME: "DarkTide"

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Pull LFS files
        run: git lfs pull || true

      - name: Restore Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: godot-import-${{ hashFiles('**/*.import') }}
          restore-keys: godot-import-

      - name: Setup
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          mkdir -p export/web

      - name: Import project
        run: godot --headless --editor --quit 2>&1 || true

      - name: Build Web
        run: godot --headless --export-release "Web" export/web/index.html

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: export/web/
          retention-days: 30
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Pull LFS files
        run: git lfs pull || true

      - name: Restore Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: godot-import-${{ hashFiles('**/*.import') }}
          restore-keys: godot-import-

      - name: Setup
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          mkdir -p export/windows

      - name: Import project
        run: godot --headless --editor --quit 2>&1 || true

      - name: Build Windows
        run: godot --headless --export-release "Windows Desktop" export/windows/${{ env.EXPORT_NAME }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: export/windows/
          retention-days: 30
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore LFS cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Pull LFS files
        run: git lfs pull || true

      - name: Restore Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: godot-import-${{ hashFiles('**/*.import') }}
          restore-keys: godot-import-

      - name: Setup
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          mkdir -p export/linux

      - name: Import project
        run: godot --headless --editor --quit 2>&1 || true

      - name: Build Linux
        run: godot --headless --export-release "Linux" export/linux/${{ env.EXPORT_NAME }}.x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: export/linux/
          retention-days: 30
          if-no-files-found: error

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./web

      - name: Add cross-origin headers for SharedArrayBuffer
        run: |
          cat > ./web/_headers <<'HEADERS'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          HEADERS

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: Create GitHub Release
    needs: [build-web, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package release archives
        run: |
          cd artifacts
          cd web-build && zip -r "../../${{ env.EXPORT_NAME }}-web.zip" . && cd ..
          cd windows-build && zip -r "../../${{ env.EXPORT_NAME }}-windows.zip" . && cd ..
          cd linux-build && tar czf "../../${{ env.EXPORT_NAME }}-linux.tar.gz" . && cd ..

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -f CHANGELOG.md ]; then
            # Extract section for current version from CHANGELOG
            awk "/^## .*${TAG}|^## .*$(echo $TAG | sed 's/^v//')/{found=1;next} /^## /{if(found)exit} found{print}" CHANGELOG.md > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release $TAG" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: "${{ env.EXPORT_NAME }} ${{ steps.notes.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.notes.outputs.tag, '-') }}
          files: |
            ${{ env.EXPORT_NAME }}-web.zip
            ${{ env.EXPORT_NAME }}-windows.zip
            ${{ env.EXPORT_NAME }}-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

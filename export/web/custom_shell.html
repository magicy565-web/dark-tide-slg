<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>$GODOT_PROJECT_NAME</title>
	$GODOT_HEAD_INCLUDE
	<script src="$GODOT_BASENAME.js"></script>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: #0a0a14;
			color: #c8b89a;
			font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
			overflow: hidden;
			touch-action: none;
		}

		#canvas {
			display: block;
			margin: 0;
			padding: 0;
			border: 0;
		}

		#canvas:focus {
			outline: none;
		}

		/* Loading screen overlay */
		#loading-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: radial-gradient(ellipse at center, #151525 0%, #0a0a14 70%, #050508 100%);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			z-index: 1000;
			transition: opacity 0.5s ease-out;
		}

		#loading-overlay.hidden {
			opacity: 0;
			pointer-events: none;
		}

		#game-title {
			font-size: 3.5rem;
			font-weight: 700;
			color: #e8d5b5;
			text-shadow:
				0 0 20px rgba(180, 40, 40, 0.6),
				0 0 60px rgba(140, 20, 20, 0.3),
				0 2px 4px rgba(0, 0, 0, 0.8);
			letter-spacing: 0.3em;
			margin-bottom: 0.5rem;
		}

		#game-subtitle {
			font-size: 1rem;
			color: #8a7a6a;
			letter-spacing: 0.15em;
			margin-bottom: 3rem;
			text-transform: uppercase;
		}

		#progress-container {
			width: 320px;
			max-width: 80vw;
			height: 6px;
			background: #1a1a2e;
			border-radius: 3px;
			overflow: hidden;
			border: 1px solid #2a1a1a;
			box-shadow: 0 0 12px rgba(120, 20, 20, 0.15);
		}

		#progress-bar {
			width: 0%;
			height: 100%;
			background: linear-gradient(90deg, #6b1a1a, #b83030, #6b1a1a);
			background-size: 200% 100%;
			animation: shimmer 2s ease-in-out infinite;
			border-radius: 3px;
			transition: width 0.3s ease;
		}

		@keyframes shimmer {
			0%, 100% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
		}

		#status-text {
			margin-top: 1.2rem;
			font-size: 0.85rem;
			color: #6a5a4a;
			letter-spacing: 0.05em;
		}

		#status-notice {
			position: fixed;
			bottom: 2rem;
			left: 50%;
			transform: translateX(-50%);
			font-size: 0.75rem;
			color: #4a3a2a;
			text-align: center;
			z-index: 1001;
		}

		#status-notice a {
			color: #8a3030;
			text-decoration: none;
		}
	</style>
</head>
<body>
	<canvas id="canvas" tabindex="1">
		Your browser does not support the canvas element.
	</canvas>

	<div id="loading-overlay">
		<div id="game-title">暗潮 SLG</div>
		<div id="game-subtitle">Dark Tide</div>
		<div id="progress-container">
			<div id="progress-bar"></div>
		</div>
		<div id="status-text">Loading...</div>
	</div>

	<div id="status-notice">
		Requires a modern browser with WebAssembly and WebGL2 support.
	</div>

	<script>
		const GODOT_CONFIG = {
			"args": [],
			"canvasResizePolicy": $GODOT_CANVAS_RESIZE_POLICY,
			"ensureCrossOriginIsolationHeaders": $GODOT_ENSURE_CROSS_ORIGIN_ISOLATION_HEADERS,
			"executable": "$GODOT_BASENAME",
			"experimentalVK": $GODOT_EXPERIMENTAL_VIRTUAL_KEYBOARD,
			"fileSizes": $GODOT_FILE_SIZES,
			"focusCanvas": $GODOT_FOCUS_CANVAS,
			"gdextensionLibs": $GODOT_GDEXTENSION_LIBS,
		};

		const overlay = document.getElementById("loading-overlay");
		const progressBar = document.getElementById("progress-bar");
		const statusText = document.getElementById("status-text");
		const statusNotice = document.getElementById("status-notice");

		const engine = new Engine(GODOT_CONFIG);

		(function () {
			// Register service worker for PWA caching
			if ("serviceWorker" in navigator) {
				navigator.serviceWorker.register("./service-worker.js").catch(function (err) {
					console.warn("SW registration failed:", err);
				});
			}

			const setStatusMode = function (mode) {
				if (mode === "hidden") {
					overlay.classList.add("hidden");
					statusNotice.style.display = "none";
				}
			};

			const setStatusNotice = function (text) {
				if (text) {
					statusNotice.innerText = text;
				}
			};

			const displayFailure = function (text) {
				statusText.innerText = text || "An error occurred.";
				statusText.style.color = "#b83030";
				progressBar.style.background = "#b83030";
				progressBar.style.width = "100%";
			};

			const onProgress = function (current, total) {
				if (total > 0) {
					const pct = Math.round((current / total) * 100);
					progressBar.style.width = pct + "%";
					statusText.innerText = "Loading... " + pct + "%";
					if (pct >= 100) {
						statusText.innerText = "Initializing engine...";
					}
				} else {
					// Indeterminate: pulse the bar
					progressBar.style.width = "60%";
					statusText.innerText = "Loading...";
				}
			};

			engine.startGame({
				"onProgress": onProgress,
			}).then(function () {
				setStatusMode("hidden");
			}, function (err) {
				console.error(err);
				displayFailure("Error: " + err.message);
			});
		})();
	</script>
</body>
</html>
